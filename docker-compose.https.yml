# HTTPS override , use with:
#   docker compose -f docker-compose.yml -f docker-compose.https.yml up -d
#
# Requires in .env:
#   DOMAIN=themis.example.com
#   LETSENCRYPT_EMAIL=admin@example.com
#
# On first run Certbot will obtain a certificate.  Subsequent runs renew automatically.
# Port 80 must be reachable from the internet for the ACME HTTP-01 challenge.
# For internal/homelab use with no public DNS, see the manual cert note below.

services:
  frontend:
    volumes:
      - ./deploy/nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: >
      sh -c "
        certbot certonly --webroot
          --webroot-path /var/www/certbot
          --email $${LETSENCRYPT_EMAIL}
          --agree-tos
          --no-eff-email
          -d $${DOMAIN}
          --non-interactive &&
        while :; do
          sleep 12h
          certbot renew --quiet
        done
      "
    restart: unless-stopped
    depends_on:
      - frontend

volumes:
  certbot-www:
  certbot-certs:
