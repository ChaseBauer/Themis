# Production compose , uses pre-built images from a registry instead of building locally.
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required .env variables:
#   IMAGE_REGISTRY=ghcr.io/your-org        (e.g. ghcr.io/ccbauer2018)
#   IMAGE_TAG=latest                        (or a specific release tag like v1.2.0)
#
# Everything else (ports, secrets, DB creds) is inherited from your root .env.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-themis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-themis}
      POSTGRES_DB: ${POSTGRES_DB:-themis}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-themis}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io/your-org}/themis-backend:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-themis}:${POSTGRES_PASSWORD:-themis}@postgres:5432/${POSTGRES_DB:-themis}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      MAX_GOLDEN_CONFIGS: ${MAX_GOLDEN_CONFIGS:-10}
      RUST_LOG: ${RUST_LOG:-themis_backend=info}
      VENDOR_PROFILES_PATH: /etc/themis/vendor_profiles.toml
    volumes:
      - ./vendor_profiles.toml:/etc/themis/vendor_profiles.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${BACKEND_PORT:-8080}:8080'
    restart: unless-stopped

  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io/your-org}/themis-frontend:${IMAGE_TAG:-latest}
    ports:
      - '${HTTP_PORT:-80}:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
