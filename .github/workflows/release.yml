name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build bundle and create release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build portable bundle
        run: ./deploy/bundle.sh "${GITHUB_REF_NAME}"

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cat > /tmp/notes.md <<EOF_NOTES
          ## Themis ${VERSION}

          Portable deployment bundle for Themis.

          ### Install
          \`\`\`bash
          tar xzf themis-${VERSION}.tar.gz
          cd themis-${VERSION}
          ./start.sh
          \`\`\`

          The bundle includes the backend image, frontend image, Postgres image, compose file, startup script, and default config.

          The first registered user becomes the admin.
          EOF_NOTES
          echo "notes_file=/tmp/notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: themis-${{ github.ref_name }}.tar.gz
