name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write        # create GitHub Releases + upload assets
  packages: write        # push to GHCR

env:
  REGISTRY: ghcr.io

jobs:
  # ── Build & push Docker images ───────────────────────────────────────────────
  images:
    name: Build & push images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image names
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "OWNER=${OWNER}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=ghcr.io/${OWNER}/themis-backend" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=ghcr.io/${OWNER}/themis-frontend" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=Themis Backend
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=Themis Frontend
            org.opencontainers.image.version=${{ steps.meta.outputs.tag }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: images

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Package docker-compose bundle
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          tar czf "dist/themis-${VERSION}-docker-compose.tar.gz" \
            docker-compose.prod.yml \
            docker-compose.https.yml \
            .env.example \
            vendor_profiles.toml \
            deploy/nginx-https.conf \
            deploy/install.sh

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME}"
          REGISTRY="ghcr.io/${{ env.OWNER }}"
          cat > /tmp/notes.md <<EOF
          ## Themis ${VERSION}

          ### Quick start (Docker Compose — recommended)
          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${VERSION}/themis-${VERSION}-docker-compose.tar.gz | tar xz
          ./deploy/install.sh
          \`\`\`

          ### OVA (VMware / VirtualBox)
          Build locally with [Packer](https://developer.hashicorp.com/packer):
          \`\`\`bash
          cd deploy/ova
          packer init .
          packer build -var "themis_version=${VERSION}" -var "image_registry=${REGISTRY}" themis.pkr.hcl
          \`\`\`

          ### Container images (GHCR)
          \`\`\`
          ${REGISTRY}/themis-backend:${VERSION}
          ${REGISTRY}/themis-frontend:${VERSION}
          \`\`\`

          ### From source
          \`\`\`bash
          git clone https://github.com/${{ github.repository }}.git && cd Themis
          cp .env.example .env   # edit JWT_SECRET and POSTGRES_PASSWORD
          docker compose up -d --build
          \`\`\`
          EOF
          echo "notes_file=/tmp/notes.md" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: dist/*.tar.gz
