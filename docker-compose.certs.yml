# On-premise TLS with existing certificates (BYOC , bring your own cert).
# Use this instead of docker-compose.https.yml when you already have cert files
# from an internal CA, a wildcard cert, or any other source.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.certs.yml up -d
#
# Required files (set paths in .env or replace inline):
#   TLS_CERT=/etc/ssl/themis/server.crt   # full chain preferred
#   TLS_KEY=/etc/ssl/themis/server.key
#
# The cert and key can live anywhere on the host , just update the paths below.

services:
  frontend:
    volumes:
      - ./deploy/nginx-certs.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERT:?Set TLS_CERT=/path/to/server.crt in .env}:/etc/ssl/themis/server.crt:ro
      - ${TLS_KEY:?Set TLS_KEY=/path/to/server.key in .env}:/etc/ssl/themis/server.key:ro
    ports:
      - "80:80"
      - "443:443"
