# Themis vendor profile overrides
#
# Profiles tell Themis how a network OS behaves over SSH:
#   1. how to pull the running config
#   2. how to deploy reviewed changes
#   3. how to guard risky deploys
#   4. how to replace a device with golden config
#   5. which noisy lines to ignore during drift checks
#
# Overrides are checked before built-in profiles. Use this file to add a new OS
# or change a built-in profile without rebuilding Themis.
#
# Minimal profile:
# [[vendor_profiles]]
# matches = ["acme-os", "acme"]
# disable_pager = ["terminal length 0"]
# show_config = "show running-config"
# configure_enter = ["configure terminal"]
# configure_exit = ["end"]
# save_config = ["write memory"]
# error_patterns = ["% invalid input", "error:"]
#
# Common drift cleanup:
# config_ignore_prefixes = ["!Time:", "! Last configuration change at "]
# config_ignore_contains = ["message from syslogd", " /kernel: "]

# Override the Cisco show command to include all defaults.
# [[vendor_profiles]]
# matches = ["cisco", "ios"]
# disable_pager = ["terminal length 0"]
# show_config = "show running-config all"

# Add a custom in-house NOS.
# [[vendor_profiles]]
# matches = ["acme-os", "acmenet"]
# disable_pager = ["set pager disable"]
# show_config = "show config full"
