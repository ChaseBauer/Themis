<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Themis API Docs</title>
    <script type="module" src="https://unpkg.com/rapidoc/dist/rapidoc-min.js"></script>
    <style>
      body {
        margin: 0;
        background: #0f172a;
      }
    </style>
  </head>
  <body>
    <rapi-doc
      spec-url="/openapi.yaml"
      render-style="read"
      theme="dark"
      primary-color="#2563eb"
      nav-bg-color="#111827"
      nav-text-color="#d1d5db"
      nav-hover-bg-color="#1f2937"
      nav-hover-text-color="#ffffff"
      bg-color="#0f172a"
      text-color="#e5e7eb"
      regular-font="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
      mono-font="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace"
      show-header="true"
      allow-authentication="true"
      allow-server-selection="true"
      allow-try="true"
      default-schema-tab="schema"
      schema-style="tree"
    >
      <span slot="nav-logo" style="font-weight: 700; color: white; padding: 16px; display: block">
        Themis API
      </span>
    </rapi-doc>
  </body>
</html>
