services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-themis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-themis}
      POSTGRES_DB: ${POSTGRES_DB:-themis}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-themis}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-themis}:${POSTGRES_PASSWORD:-themis}@postgres:5432/${POSTGRES_DB:-themis}
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env (run: cp .env.example .env)}"
      MAX_GOLDEN_CONFIGS: ${MAX_GOLDEN_CONFIGS:-10}
      RUST_LOG: ${RUST_LOG:-themis_backend=info}
      VENDOR_PROFILES_PATH: /etc/themis/vendor_profiles.toml
    volumes:
      - ./vendor_profiles.toml:/etc/themis/vendor_profiles.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Published for local Vite dev server proxy; nginx also reaches it on the Docker network.
    ports:
      - '${BACKEND_PORT:-8080}:8080'
    expose:
      - '8080'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '${HTTP_PORT:-80}:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
