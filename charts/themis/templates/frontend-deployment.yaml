apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "themis.frontend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "themis.labels" . | nindent 4 }}
    {{- include "themis.frontend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "themis.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "themis.labels" . | nindent 8 }}
        {{- include "themis.frontend.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/nginx-config: {{ .Values.vendorProfiles | sha256sum }}
    spec:
      serviceAccountName: {{ include "themis.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101   # nginx user in nginx:alpine
        runAsGroup: 101
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
              readOnly: true
            # nginx needs a writable tmp dir when running non-root
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "themis.fullname" . }}-nginx
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
