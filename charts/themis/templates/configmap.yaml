apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "themis.fullname" . }}-vendor-profiles
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "themis.labels" . | nindent 4 }}
data:
  vendor_profiles.toml: |
    {{- .Values.vendorProfiles | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "themis.fullname" . }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "themis.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        add_header X-Frame-Options           DENY                            always;
        add_header X-Content-Type-Options    nosniff                         always;
        add_header Referrer-Policy           strict-origin-when-cross-origin always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api {
            proxy_pass         http://{{ include "themis.backend.fullname" . }}:8080;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600;
        }

        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        location = /index.html {
            add_header Cache-Control "no-store";
        }

        gzip on;
        gzip_types text/plain text/css application/javascript application/json image/svg+xml;
        gzip_min_length 1024;
    }
