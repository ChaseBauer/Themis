apiVersion: v1
kind: Service
metadata:
  name: {{ include "themis.frontend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "themis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "themis.frontend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
